<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROCK Hub — Sign In</title>
  <link rel="stylesheet" href="/css/vars.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-brand">
      <div class="brand-logo">
        <img src="/img/rock-logo.png" alt="The ROCK Association" style="height:76px;width:auto;filter:drop-shadow(0 4px 16px rgba(201,169,110,.3));">
      </div>
      <p class="brand-tagline">The ROCK Association Intranet</p>
      <p class="brand-org">gorock.org</p>
    </div>

    <div class="login-body">
      <h2 class="login-title">Welcome Back</h2>
      <p class="login-subtitle">Sign in with your gorock.org Google Workspace account to access the ROCK Hub dashboard and resources.</p>

      <div class="login-error" id="loginError" style="display:none"></div>

      <a href="/auth/google" class="google-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </a>

      <p class="login-note">Access restricted to @gorock.org accounts</p>
    </div>
  </div>

  <div class="login-mountain" aria-hidden="true">
    <img src="/images/mountain-brand.svg" alt="">
  </div>

  <footer class="login-footer">
    <span>The ROCK Association</span>
    <span class="footer-sep">·</span>
    <a href="https://gorock.org" target="_blank" rel="noopener">gorock.org</a>
    <span class="footer-sep">·</span>
    <span>&copy; 2026</span>
  </footer>

  <script>
    const p = new URLSearchParams(location.search);
    const msgs = {
      access_denied:   'Access denied. Use your @gorock.org Google account.',
      login_required:  'Please sign in to access ROCK Hub.'
    };
    const msg = msgs[p.get('error')];
    if (msg) {
      const el = document.getElementById('loginError');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
