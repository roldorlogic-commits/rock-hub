<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROCK Hub — Reset Password</title>
  <link rel="stylesheet" href="/css/vars.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-brand">
      <div class="brand-logo">
        <img src="/img/rock-logo.png" alt="The ROCK Association" style="height:76px;width:auto;filter:drop-shadow(0 4px 16px rgba(201,169,110,.3));">
      </div>
      <p class="brand-tagline">The ROCK Association Intranet</p>
      <p class="brand-org">gorock.org</p>
    </div>

    <div class="login-body">
      <h2 class="login-title">Reset Your Password</h2>
      <p class="login-subtitle" id="resetSubtitle">Enter a new password for your volunteer account.</p>

      <div class="login-error" id="resetError" style="display:none"></div>
      <div class="login-success" id="resetSuccess" style="display:none"></div>

      <form id="resetForm" onsubmit="handleResetSubmit(event)">
        <label>New Password <span class="field-hint">(min 8 characters)</span>
          <div class="password-wrap">
            <input type="password" id="newPassword" minlength="8" required autocomplete="new-password">
            <button type="button" class="pw-toggle" onclick="togglePw('newPassword', this)">Show</button>
          </div>
        </label>
        <label>Confirm New Password <input type="password" id="confirmNewPassword" minlength="8" required autocomplete="new-password"></label>
        <button type="submit" class="btn-volunteer-submit">Reset Password</button>
      </form>

      <p style="text-align:center;margin-top:16px;"><a href="/?tab=volunteer" style="font-size:11px;">← Back to login</a></p>
    </div>
  </div>

  <div class="login-mountain" aria-hidden="true">
    <img src="/images/mountain-brand.svg" alt="">
  </div>

  <footer class="login-footer">
    <span>The ROCK Association</span>
    <span class="footer-sep">·</span>
    <a href="https://gorock.org" target="_blank" rel="noopener">gorock.org</a>
    <span class="footer-sep">·</span>
    <span>&copy; 2026</span>
  </footer>

  <script>
    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      btn.textContent = showing ? 'Show' : 'Hide';
    }

    const params = new URLSearchParams(location.search);
    const token  = params.get('token');
    const email  = params.get('email');

    if (!token || !email) {
      document.getElementById('resetForm').style.display = 'none';
      const el = document.getElementById('resetError');
      el.textContent = 'This reset link is missing required information. Please request a new one from the login page.';
      el.style.display = 'block';
    }

    async function handleResetSubmit(e) {
      e.preventDefault();
      const errEl = document.getElementById('resetError');
      const okEl  = document.getElementById('resetSuccess');
      errEl.style.display = 'none';
      okEl.style.display  = 'none';

      const newPassword = document.getElementById('newPassword').value;
      const confirmNewPassword = document.getElementById('confirmNewPassword').value;
      if (newPassword !== confirmNewPassword) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }

      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      try {
        const res = await fetch('/auth/volunteer/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, token, newPassword, confirmPassword: confirmNewPassword })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error || 'Could not reset password.'; errEl.style.display = 'block'; return; }
        document.getElementById('resetForm').style.display = 'none';
        okEl.textContent = data.message + ' Redirecting to login…';
        okEl.style.display = 'block';
        setTimeout(() => location.href = '/?tab=volunteer', 2000);
      } catch (err) {
        errEl.textContent = 'Network error — please try again.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
